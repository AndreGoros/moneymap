name: Publish MoneyMap to PyPI

on:
  release:
    types: [published] # Se activa solo cuando creas una "Release" en GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Requisito de seguridad para Trusted Publishing
    environment: pypi
    permissions:
      id-token: write  
      contents: read   

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build binary wheel and source tarball
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
